{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-8 bg-white p-6 rounded shadow">
    <h2 class="text-xl font-bold mb-4">Login</h2>
    <form method="post">
        <label class="block mb-2 font-semibold">Username</label>
        <input name="username" class="w-full mb-4 px-3 py-2 border rounded" required>
        <label class="block mb-2 font-semibold">Password</label>
        <input name="password" type="password" class="w-full mb-4 px-3 py-2 border rounded" required>
        <button class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Login</button>
    </form>
</div>
{% endblock %}
